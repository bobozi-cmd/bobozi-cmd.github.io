<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style type="text/css">
        .top-bar {
            width: 100%;
            height: 50px;
            margin: 0;
            display: flex;
        }
        .box-top {
            width: 100%;
            min-width: 1350px;
            background-color: rgba(255,255,255,0.5);
            padding: 20px;
            /*border-bottom-left-radius: 8px;*/
            /*border-bottom-right-radius: 8px;*/
        }
        .top-ui {
            width: 100%;
            min-width: 800px;
            height: 50px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .top-ui li{
            width:10%;
            min-width: 50px;
            margin:-5px 50px 0 70px;
            color: rgba(204, 200, 241, 0.5);
            float: left;
            text-align: center;
            display: block;
        }
        .top-ui a{
            color: black;
            text-decoration: none;
        }
        .top-ui a:hover{
            color: white;
        }
        .top-ui img{
            height: 40px;
            margin: 0;
            padding: 0;
            display: inline;
            position: relative;
            top: -10px;
        }
    </style>
